<form class="p-10" [formGroup]="form">
  <h1 mat-dialog-title>Profile</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>ID</mat-label>
      <input matInput formControlName="uid" readonly>
      <button mat-icon-button matSuffix (click)="onCopyToClipboardClick(form.get('uid').value)">
        <mat-icon>content_copy</mat-icon>
      </button>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" readonly>
      <button mat-icon-button matSuffix (click)="onCopyToClipboardClick(form.get('email').value)">
        <mat-icon>content_copy</mat-icon>
      </button>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="displayName" readonly>
    </mat-form-field>
  </div>
<!--  <div mat-dialog-actions>-->
<!--    <button mat-button [mat-dialog-close]="null">Cancel</button>-->
<!--    <button mat-flat-button color="primary" [mat-dialog-close]="form.getRawValue()" [disabled]="!form.valid">Add</button>-->
<!--  </div>-->
</form>
