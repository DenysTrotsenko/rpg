<span class="f-1">{{node.name}}</span>
<span class="visible-on-hover">
  <button mat-icon-button (click)="onInfoClick()">
    <mat-icon>info</mat-icon>
  </button>
  <button mat-icon-button (click)="onAddClick()">
    <mat-icon>add</mat-icon>
  </button>
  <button mat-icon-button (click)="onEditClick()">
    <mat-icon>edit</mat-icon>
  </button>
  <button mat-icon-button (click)="onDeleteClick()">
    <mat-icon>delete</mat-icon>
  </button>
</span>
