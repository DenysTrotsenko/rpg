<div *ngIf="task$ | async as task" class="d-f ai-c g-5">
  <button mat-icon-button (click)="onStatusClick()" [class]="style$ | async">
    <mat-icon>{{icon$ | async}}</mat-icon>
  </button>
  <p class="mb-0 f-1 p-r" [class]="style$ | async">
    {{task?.name}}
    <span class="actions">
      <button mat-icon-button (click)="onAddClick(task)">
        <mat-icon>add</mat-icon>
      </button>
      <button mat-icon-button (click)="onEditClick(task)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button (click)="onDeleteClick(task)">
        <mat-icon>delete</mat-icon>
      </button>
    </span>
  </p>
</div>
<div class="d-f fd-c pl-30">
  <std-todo-task *ngFor="let i of (task$ | async)?.tasks" [task]="i"></std-todo-task>
</div>
