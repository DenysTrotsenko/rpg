<table class="mat-table bs-0 w-100">
  <tr class="mat-row">
    <td *ngFor="let i of characteristics; trackBy: trackById;" class="mat-cell p-5">
      {{i?.labels?.abbreviation}}
    </td>
  </tr>
  <tr class="mat-row bg-gray-800">
    <td *ngFor="let i of characteristics; trackBy: trackById;" class="mat-cell p-5">
      {{i.current}}%
    </td>
  </tr>
  <tr class="mat-row">
    <td *ngFor="let i of characteristics; trackBy: trackById;" class="mat-cell p-5">
      {{i.bonus}}
    </td>
  </tr>
</table>
