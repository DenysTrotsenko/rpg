<h1 mat-dialog-title>Advance Character</h1>
<div mat-dialog-content class="d-f fd-c">
  <mat-form-field appearance="outline" style="align-items:stretch;">
    <mat-label>Advancement Type</mat-label>
    <mat-select [formControl]="type">
      <mat-option *ngFor="let i of ADVANCEMENT_TYPES;" [value]="i.id">{{i.name}}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="outline" style="align-items:stretch;">
    <mat-label>Options</mat-label>
    <mat-select [formControl]="option">
      <mat-option *ngFor="let i of options$ | async;" [value]="i.id">
        {{i.name}}
      </mat-option>
    </mat-select>
  </mat-form-field>
  <div *ngIf="show$ | async" class="d-f ai-c g-5">
    <mat-form-field appearance="outline">
      <mat-label>Current</mat-label>
      <input matInput readonly [value]="current$ | async | string">
    </mat-form-field>
    <mat-icon>arrow_forward</mat-icon>
    <mat-form-field appearance="outline">
      <mat-label>Next</mat-label>
      <input matInput readonly [value]="next$ | async | string">
    </mat-form-field>
  </div>
</div>
<div mat-dialog-actions>
  <button mat-button [mat-dialog-close]="null">Cancel</button>
<!--  <button mat-flat-button color="primary" [disabled]="!form.valid" [mat-dialog-close]="form.getRawValue()">Add</button>-->
</div>
