<p *ngIf="skills.length > 0">
  <b class="c-gray">Skills: </b>
  <span *ngFor="let i of skills;" class="comma-separated ws-pl c-pointer" [matTooltip]="i.tooltip">
    {{i.name}} {{i.total}}%
  </span>
</p>
<p *ngIf="specialisations.length > 0">
  <b class="c-gray">Specialisations: </b>
  <span *ngFor="let i of specialisations;" class="comma-separated ws-pl c-pointer" [matTooltip]="i.tooltip">
    {{i.skill}} ({{i.name}}) {{i.total}}%
  </span>
</p>
