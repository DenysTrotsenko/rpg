<ng-container *ngIf="campaign$ | async as campaign;">
  <mat-toolbar class="g-10">
    <h1>Campaign: <span class="ff-g">{{campaign.name}}</span></h1>
    <span class="f-1"></span>
    <button mat-flat-button color="primary" (click)="onAddEventClick(campaign)">
      + Event
    </button>
    <button mat-flat-button color="primary" (click)="onAddLocationClick(campaign)">
      + Location
    </button>
    <button mat-flat-button color="primary" (click)="onAddPersonaClick(campaign)">
      + Persona
    </button>
    <button mat-flat-button color="primary" (click)="onAddExperienceClick(campaign)">
      + XP
    </button>
  </mat-toolbar>
  <mat-tab-group class="p-10">
    <mat-tab label="Events">
      <mat-accordion class="o-a d-b mt-10">
        <mat-expansion-panel *ngFor="let i of campaign.events | sort : 'createdAt' : 'desc';" hideToggle>
          <mat-expansion-panel-header>
            <mat-panel-title class="ff-g">
              {{i.name}}
              <span class="f-1"></span>
              <button mat-icon-button (click)="onEditEventClick(i)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="onDeleteEventClick(i.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div>
            <p *ngIf="i.description" matLine class="ws-pw">{{i.description}}</p>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </mat-tab>
    <mat-tab label="Locations">
      <mat-accordion class="o-a d-b mt-10">
        <mat-expansion-panel *ngFor="let i of campaign.locations | sort : 'name';" hideToggle>
          <mat-expansion-panel-header>
            <mat-panel-title class="ff-g">
              {{i.name}}
              <span class="f-1"></span>
              <button mat-icon-button (click)="onEditEventClick(i)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="onDeleteEventClick(i.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div>
            <p *ngIf="i.description" matLine class="ws-pw">{{i.description}}</p>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </mat-tab>
    <mat-tab label="Personas">
      <mat-accordion class="o-a d-b mt-10">
        <mat-expansion-panel *ngFor="let i of campaign.personas | sort : 'name';" hideToggle>
          <mat-expansion-panel-header>
            <mat-panel-title class="ff-g">
              {{i.name}}
              <span class="f-1"></span>
              <button mat-icon-button (click)="onEditEventClick(i)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="onDeleteEventClick(i.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div>
            <p *ngIf="i.description" matLine class="ws-pw">{{i.description}}</p>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </mat-tab>
    <mat-tab label="XP">
      <mat-accordion class="o-a d-b mt-10">
        <mat-expansion-panel hideToggle>
          <mat-expansion-panel-header>
            <mat-panel-title class="ff-g">TOTAL</mat-panel-title>
          </mat-expansion-panel-header>
<!--            <ng-container *ngIf="users$ | async as users">-->
<!--              <table *ngIf="getTotalNormalizedExperience(users, campaign.experience) as xps" class="mat-table bs-0 w-100">-->
<!--                <tr class="mat-row">-->
<!--                  <td *ngFor="let xp of xps;" class="mat-cell p-5">{{xp.name}}</td>-->
<!--                </tr>-->
<!--                <tr class="mat-row">-->
<!--                  <td *ngFor="let xp of xps;" class="mat-cell p-5">{{xp.value}}</td>-->
<!--                </tr>-->
<!--              </table>-->
<!--            </ng-container>-->
        </mat-expansion-panel>
        <mat-expansion-panel *ngFor="let i of campaign.experience | sort : 'createdAt' : 'desc'; trackBy: trackById" hideToggle>
          <mat-expansion-panel-header>
            <mat-panel-title class="ff-g">
              {{i.name}}
              <span class="f-1"></span>
              <button mat-icon-button (click)="onEditExperienceClick(i)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="onDeleteExperienceClick(i.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div>
            <p *ngIf="i.description" matLine class="ws-pw">{{i.description}}</p>
<!--            <ng-container *ngIf="users$ | async as users">-->
<!--              <table *ngIf="getNormalizedExperience(users, i) as xps" class="mat-table bs-0 w-100">-->
<!--                <tr class="mat-row"><td *ngFor="let xp of xps;" class="mat-cell p-5">{{xp.name}}</td></tr>-->
<!--                <tr class="mat-row"><td *ngFor="let xp of xps;" class="mat-cell p-5">{{xp.value}}</td></tr>-->
<!--              </table>-->
<!--            </ng-container>-->
            <mat-divider class="mt-5 mb-5"></mat-divider>
            <std-todo-editor class="mt-10"
              [mode]="mode$ | async"
              [hide]="hide$ | async"
              [characters]="characters$ | async"
              [tasks]="i.tasks"
              (valueChange)="onResultChange($event, campaign, i)">
            </std-todo-editor>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </mat-tab>
  </mat-tab-group>
</ng-container>
