<form [formGroup]="form">
  <h1 mat-dialog-title>Add Event</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Have Access</mat-label>
      <mat-select formControlName="members" multiple>
        <mat-option *ngFor="let i of members$ | async;" [value]="i.id">
          {{i?.name}}<span *ngIf="i?.email" class="c-gray"> ({{i.email}})</span>
        </mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
  </div>
  <div mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">
      Cancel
    </button>
    <button mat-flat-button color="primary" [mat-dialog-close]="onSubmit(form.getRawValue(), original)" [disabled]="!form.valid">
      Add
    </button>
  </div>
</form>
