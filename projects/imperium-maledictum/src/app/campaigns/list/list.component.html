<mat-toolbar class="f-0-0-a">
  <a mat-flat-button color="primary" routerLink="../create">Create Campaign</a>
</mat-toolbar>
<mat-nav-list class="p-10">
  <mat-list-item *ngFor="let i of campaigns$ | async; trackBy: trackById;">
    <a matLine [routerLink]="['../view', i.id]">{{ i.name }}</a>
    <button *ngIf="i.canDelete" mat-icon-button (click)="onDeleteClick(i)" matTooltip="Delete">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-list-item>
</mat-nav-list>
