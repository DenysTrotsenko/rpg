<mat-toolbar>
  <h1>Campaign Creation</h1>
</mat-toolbar>
<form [formGroup]="form" (ngSubmit)="onSubmit(form.getRawValue())">
  <mat-card class="mb-15">
    <mat-card-content class="d-f fd-c">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Setting</mat-label>
        <mat-select formControlName="setting">
          <mat-option *ngFor="let i of settings$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Members</mat-label>
        <mat-select formControlName="members" multiple>
          <mat-option *ngFor="let i of users$ | async;" [value]="i.id">
            {{i.name || i.email}}<span *ngIf="i.email" class="c-gray"> ({{i.email}})</span>
          </mat-option>
        </mat-select>
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <mat-card class="mb-15">
    <mat-card-actions>
      <button type="reset" mat-button class="mr-15">Reset</button>
      <button type="submit" mat-flat-button color="primary" [disabled]="!form.valid">Save</button>
    </mat-card-actions>
  </mat-card>
</form>
