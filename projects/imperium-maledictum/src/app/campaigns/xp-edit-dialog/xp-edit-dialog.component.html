<form [formGroup]="form">
  <h1 mat-dialog-title>Add Event</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
    <h2>XP</h2>
    <div formGroupName="value" class="d-f ai-c g-5">
      <mat-form-field *ngFor="let i of members$ | async;" appearance="outline">
        <mat-label>{{i.name ?? i.email}}</mat-label>
        <input matInput type="number" min="0" [formControlName]="i.id">
      </mat-form-field>
    </div>
  </div>
  <div mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">
      Cancel
    </button>
    <button mat-flat-button color="primary" [mat-dialog-close]="onSubmit(form.getRawValue(), data?.original)" [disabled]="!form.valid">
      Add
    </button>
  </div>
</form>
