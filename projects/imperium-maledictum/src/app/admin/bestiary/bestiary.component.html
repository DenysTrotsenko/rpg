<form [formGroup]="form">
  <h1 mat-dialog-title>Add NPC</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <ng-container formGroupName="labels">
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>
    </ng-container>
    <div class="d-f g-10">
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Size</mat-label>
        <mat-select formControlName="size">
          <mat-option *ngFor="let i of sizes$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let i of types$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Faction</mat-label>
        <mat-select formControlName="faction">
          <mat-option *ngFor="let i of factions$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option *ngFor="let i of roles$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <div class="d-f jc-sb" formArrayName="characteristics">
      <mat-form-field
        *ngFor="let characteristic of characteristics$ | async; trackBy: trackById; let i = index"
        [formGroupName]="i"
        appearance="outline"
        style="width:80px;">
        <mat-label>{{characteristic.labels?.abbreviation}}</mat-label>
        <input matInput type="number"
          formControlName="value"
          [min]="10"
          [max]="characteristicMax$ | async"
          [step]="5">
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline" style="align-items:stretch;">
      <mat-label>Traits</mat-label>
      <mat-select formControlName="traits" multiple>
        <mat-option *ngFor="let i of traits$ | async; trackBy: trackById;" [value]="i.id">
          {{i.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="onAddSkillClick()">Add Skill</button>
    <button mat-flat-button color="primary" (click)="onAddSpecialisationClick()">Add Specialisation</button>
    <div class="d-f fd-c" formArrayName="skills">
      <mat-form-field
        *ngFor="let skill of selectedSkills$ | async; trackBy: trackById; let i = index"
        [formGroupName]="i"
        appearance="outline">
        <mat-label>{{skill.name}}</mat-label>
        <input matInput type="number" formControlName="value" [min]="0" [max]="20" [step]="5">
      </mat-form-field>
    </div>
    <div class="d-f fd-c" formArrayName="specialisations">
      <mat-form-field
        *ngFor="let specialisation of selectedSpecialisations$ | async; trackBy: trackById; let i = index"
        [formGroupName]="i"
        appearance="outline">
        <mat-label>{{specialisation.name}}</mat-label>
        <input matInput type="number" formControlName="value" [min]="0" [max]="20" [step]="5">
      </mat-form-field>
    </div>
<!--    <div class="d-f fd-c" formGroupName="skills">-->
<!--      <mat-form-field *ngFor="let i of skills$ | async; trackBy: trackById;" appearance="outline">-->
<!--        <mat-label>{{i.name}}</mat-label>-->
<!--        <input matInput type="number" [formControlName]="i.id" [min]="0" [max]="20" [step]="5">-->
<!--      </mat-form-field>-->
<!--    </div>-->
<!--    <div class="d-f jc-sb" formGroupName="specialisations">-->
<!--      <mat-form-field *ngFor="let i of specialisations$ | async; trackBy: trackById;" appearance="outline">-->
<!--        <mat-label>{{(i.skill | getById)?.name}} ({{i.name}})</mat-label>-->
<!--        <input matInput type="number" [formControlName]="i.id" [min]="0" [max]="20" [step]="5">-->
<!--      </mat-form-field>-->
<!--    </div>-->
  </div>
  <div mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">Cancel</button>
    <button mat-flat-button color="primary" (click)="onTest()">Add</button>
  </div>
</form>
