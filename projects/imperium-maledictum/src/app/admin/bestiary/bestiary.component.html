<form [formGroup]="form">
  <h1 mat-dialog-title>Add NPC</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <div class="d-f g-10">
      <mat-form-field appearance="outline">
        <mat-label>Size</mat-label>
        <mat-select formControlName="size">
          <mat-option *ngFor="let i of sizes$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option *ngFor="let i of roles$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <div class="d-f jc-sb" formGroupName="characteristics">
      <mat-form-field *ngFor="let i of characteristics$ | async; trackBy: trackById;" appearance="outline" style="width:80px;">
        <mat-label>{{i.labels?.abbreviation}}</mat-label>
        <input matInput type="number"
          [formControlName]="i.id"
          [min]="10"
          [max]="characteristicMax$ | async"
          [step]="5">
      </mat-form-field>
    </div>


    <ng-container formGroupName="labels">
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>
    </ng-container>
  </div>
  <div mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">Cancel</button>
    <button mat-flat-button color="primary" (click)="onTest()">Add</button>
  </div>
</form>
