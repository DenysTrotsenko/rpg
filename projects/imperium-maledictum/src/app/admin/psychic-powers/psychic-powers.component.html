<form [formGroup]="form">
  <h1 mat-dialog-title>Add Psychic Power</h1>
  <div mat-dialog-content class="d-f fd-c">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>
    <div class="d-f ai-c g-20 mb-20">
      <mat-form-field class="form-field-no-bottom-padding f-1" appearance="outline">
        <mat-label>Psychic Discipline</mat-label>
        <mat-select formControlName="discipline">
          <mat-option *ngFor="let i of disciplines$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-checkbox formControlName="overt">Overt</mat-checkbox>
    </div>
    <div class="d-f g-10">
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Warp Rating</mat-label>
        <input matInput type="number" formControlName="cost">
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Difficulty</mat-label>
        <mat-select formControlName="difficulty">
          <mat-option *ngFor="let i of difficulties$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Range</mat-label>
        <mat-select formControlName="range">
          <mat-option *ngFor="let i of ranges$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Target</mat-label>
        <mat-select formControlName="target" multiple>
          <mat-option *ngFor="let i of targets$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" style="min-width:100px;">
        <mat-label>Duration</mat-label>
        <mat-select formControlName="duration">
          <mat-option *ngFor="let i of durations$ | async; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <ng-container formGroupName="labels">
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>
    </ng-container>
  </div>
  <div mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">Cancel</button>
    <button mat-flat-button color="primary" [mat-dialog-close]="form.getRawValue()" [disabled]="!form.valid">Add</button>
  </div>
</form>
