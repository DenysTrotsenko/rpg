<mat-sidenav-container *ngIf="valid">
  <mat-sidenav mode="side" opened>
    <mat-form-field class="m-5 form-field-no-bottom-padding" appearance="outline">
      <mat-label>Setting</mat-label>
      <mat-select [formControl]="control">
        <mat-option *ngFor="let i of settings$ | async; trackBy: trackById;" [value]="i.id">
          {{i.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-nav-list *ngIf="control.value" dense>
      <a *ngFor="let i of settingOptions$ | async;" mat-list-item [routerLink]="i.link" routerLinkActive="active">
        <span>{{i.label}}</span>
      </a>
      <mat-divider></mat-divider>
      <a *ngFor="let i of otherOptions$ | async;" mat-list-item [routerLink]="i.link" routerLinkActive="active">
        <span>{{i.label}}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
<p *ngIf="!valid" class="p-10">You have a duplicated json files in routes > data > path.</p>
