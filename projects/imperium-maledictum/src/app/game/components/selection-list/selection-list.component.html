<mat-action-list>
  <button mat-list-item (click)="onSelectClick(ref)">
    Select / Deselect All
  </button>
</mat-action-list>
<mat-selection-list [formControl]="control" #ref>
  <mat-list-option *ngFor="let i of value; trackBy: trackById;" [value]="i.id">
    {{i.name}}
  </mat-list-option>
</mat-selection-list>
