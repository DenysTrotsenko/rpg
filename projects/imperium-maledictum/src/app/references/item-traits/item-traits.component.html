<h1 class="mb-5">Qualities</h1>
<mat-accordion>
  <mat-expansion-panel *ngFor="let i of itemQualities$ | async; trackBy: trackById;" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title class="ff-g">{{i.name}}</mat-panel-title>
    </mat-expansion-panel-header>
    <div>
      <p matLine><i>{{i.labels?.description}}</i></p>
    </div>
  </mat-expansion-panel>
</mat-accordion>
