<mat-accordion>
  <mat-expansion-panel *ngFor="let i of conditions$ | async; trackBy: trackById;" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title class="ff-g">{{i.name}}</mat-panel-title>
    </mat-expansion-panel-header>
    <div>
      <p matLine class="ws-pw"><i>{{i.labels?.description}}</i></p>
    </div>
  </mat-expansion-panel>
</mat-accordion>
