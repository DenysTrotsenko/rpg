<mat-accordion>
  <mat-expansion-panel *ngFor="let i of skills$ | async; trackBy: trackById;" hideToggle (afterExpand)="opened$.next(i.id)">
    <mat-expansion-panel-header>
      <mat-panel-title class="ff-g">{{i.name}} ({{(i.characteristic | getById)?.labels?.abbreviation}})</mat-panel-title>
    </mat-expansion-panel-header>
    <ng-template matExpansionPanelContent>
      <div>
        <p matLine class="c-gray"><i>{{i.labels.description}}</i></p>
        <p *ngFor="let j of specialisations$ | async" matLine>
          <b>{{j.name}}
            <span *ngIf="j.multiple || j.restricted">
              ({{[j.multiple ? 'Various' : null, j.restricted ? 'Restricted' : null] | filterTruthy | join: ', '}})
            </span>:
          </b>
          {{j.labels?.description}}
        </p>
      </div>
    </ng-template>
  </mat-expansion-panel>
</mat-accordion>
