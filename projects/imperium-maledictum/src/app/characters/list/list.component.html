<mat-toolbar class="f-0-0-a">
  <a mat-flat-button color="primary" routerLink="../create">Create Character</a>
</mat-toolbar>
<mat-nav-list class="p-10">
  <mat-list-item *ngFor="let i of characters$ | async; trackBy: trackById;">
    <a matLine [routerLink]="['../view', i.id]">{{ i.name }}</a>
    <button *ngIf="i.canDelete" mat-icon-button (click)="onDeleteClick(i)" matTooltip="Delete">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-list-item>
</mat-nav-list>

<mat-nav-list>
  <mat-list-item *ngFor="let i of characters$ | async">
    <a matLine [routerLink]="['../pc/view', i.id]">{{ i.name }}</a>
    <a mat-icon-button [routerLink]="['../pc/update', i.id]" matTooltip="Upgrade">
      <mat-icon>keyboard_double_arrow_up</mat-icon>
    </a>
    <button mat-icon-button (click)="onDeleteClick(i)" matTooltip="Delete">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-list-item>
</mat-nav-list>
