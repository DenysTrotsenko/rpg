<h2 mat-dialog-title>Specialty</h2>
<mat-dialog-content>
  <p>Choose a Specialty</p>
  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Specialty</mat-label>
    <input matInput type="text" [formControl]="specialty" required minlength="1">
    <mat-error *ngIf="specialty?.hasError('required')">Specialty is required.</mat-error>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions class="actions">
  <button mat-stroked-button color="primary" class="mr-5" [mat-dialog-close]="null">
    Cancel
  </button>
  <button mat-flat-button color="primary" class="ml-5" [disabled]="!specialty.valid" [mat-dialog-close]="specialty.value">
    Ok
  </button>
</mat-dialog-actions>
