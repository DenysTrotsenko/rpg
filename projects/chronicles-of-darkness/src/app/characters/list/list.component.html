<mat-list>
  <mat-list-item *ngFor="let i of characters$ | async; trackBy: trackByFn">
    <img matListAvatar [src]="i.meta.portrait">
    <a matLine [routerLink]="'../pc/view/' + i.id">{{i.name}}</a>
    <button mat-icon-button (click)="onEditClick(i)">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button (click)="onDeleteClick(i)">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-list-item>
</mat-list>
