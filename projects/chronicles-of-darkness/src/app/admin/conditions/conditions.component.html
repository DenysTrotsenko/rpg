<!-- HEADER -->
<h1 class="d-f jc-sb">
  Conditions
  <button mat-flat-button color="primary" [disabled]="disabled$ | async" (click)="onSave()">
    Save Changes
  </button>
</h1>
<!-- ADD NEW ITEM -->
<form [formGroup]="form" #formDirective="ngForm" (ngSubmit)="onAdd(form.value, formDirective)">
  <mat-card class="mb-10">
    <mat-card-content class="d-f fd-c ai-s">
      <div class="d-f">
        <mat-form-field appearance="outline">
          <mat-label>Book</mat-label>
          <mat-select formControlName="book" required>
            <mat-option *ngFor="let book of books$ | async" [value]="book.id">{{book.name}}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="ml-10">
          <mat-label>Page</mat-label>
          <input matInput type="number" formControlName="page" required>
        </mat-form-field>
      </div>
      <mat-form-field appearance="outline" class="f-1">
        <mat-label>Name</mat-label>
        <input matInput type="text" formControlName="name" required minlength="1">
        <mat-error *ngIf="form.get('name')?.hasError('required')">Field is required.</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" required minlength="1"></textarea>
        <mat-error *ngIf="form.get('description')?.hasError('required')">Field is required.</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Resolution</mat-label>
        <textarea matInput formControlName="resolution" minlength="1"></textarea>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Beat</mat-label>
        <textarea matInput formControlName="beat" minlength="1"></textarea>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Possible Sources</mat-label>
        <textarea matInput formControlName="sources" minlength="1"></textarea>
      </mat-form-field>
      <div>
        <button mat-flat-button class="as-fs mr-10" color="accent" type="submit" [disabled]="!form.valid">
          {{ !!form.get('id').value ? 'Edit' : 'Add' }}
        </button>
        <button *ngIf="!!form.get('id').value" mat-stroked-button class="as-fs" color="accent" type="button" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</form>
<!-- ITEM LIST -->
<mat-accordion>
  <mat-expansion-panel *ngFor="let item of data$ | async" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title>{{item.name}}</mat-panel-title>
    </mat-expansion-panel-header>
    <p><span class="fw-b">Description: </span>{{item.description}}</p>
    <p><span *ngIf="!!item.resolution" class="fw-b">Resolution: </span>{{item.resolution}}</p>
    <p><span *ngIf="!!item.beat" class="fw-b">Beat: </span>{{item.beat}}</p>
    <mat-action-row>
      <button mat-stroked-button color="accent" (click)="onEdit(item)">Edit</button>
      <button mat-stroked-button color="warn" class="ml-10" (click)="onDelete(item)">Delete</button>
    </mat-action-row>
  </mat-expansion-panel>
</mat-accordion>
