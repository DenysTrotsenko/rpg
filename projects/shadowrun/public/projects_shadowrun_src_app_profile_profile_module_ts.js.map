<h2 mat-dialog-title>Delete</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions class="actions">
  <button mat-stroked-button color="primary" class="mr-5" [mat-dialog-close]="false">
    Cancel
  </button>
  <button mat-flat-button color="primary" class="ml-5" [disabled]="!form.valid" [mat-dialog-close]="form.value">
    Delete
  </button>
</mat-dialog-actions>
