<p *ngIf="view === 'concise'">
  <b>Qualities:</b>
  <span *ngFor="let i of qualities$ | async;" class="comma-separated ws-pw" [matTooltip]="i.tooltip">
    {{i.name}}{{!!i.specialty ? ' (' + i.specialty + ')' : ''}}{{!!i.rating ? ' ' + i.rating : ''}}
  </span>
</p>
<mat-card *ngIf="view === 'full'" class="mb-15">
  <mat-card-header class="ai-fs">
    <mat-card-title>Qualities</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table class="mat-table">
      <thead>
      <tr class="mat-header-row">
        <th class="mat-header-cell">Name</th>
        <th class="mat-header-cell">Rating</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let i of qualities$ | async;" class="mat-row">
        <td class="mat-cell"><span [matTooltip]="i.tooltip">{{i.name}}{{!!i.specialty ? ' (' + i.specialty + ')' : ''}}</span></td>
        <td class="mat-cell">{{i.rating}}</td>
      </tr>
      </tbody>
    </table>
  </mat-card-content>
</mat-card>
