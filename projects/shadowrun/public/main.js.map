<img [src]="src$ | async">
<button type="button" mat-icon-button class="btn back" [disabled]="isDisabled()" (click)="onBackClick()">
  <mat-icon>arrow_back_ios</mat-icon>
</button>
<button type="button" mat-icon-button class="btn forward" [disabled]="isDisabled()" (click)="onForwardClick()">
  <mat-icon>arrow_forward_ios</mat-icon>
</button>
<button type="button" mat-icon-button class="btn list" [disabled]="isDisabled()" (click)="onListClick()">
  <mat-icon>apps</mat-icon>
</button>
