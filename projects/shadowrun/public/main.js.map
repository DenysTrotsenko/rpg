<mat-card class="mb-15">
  <mat-card-header class="ai-fs">
    <mat-card-title>Knowledge</mat-card-title>
    <button mat-button type="button" (click)="onAddKnowledgeClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let i of form.controls;" class="d-f ai-b fw-nw">
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Category</mat-label>
        <mat-select [formControl]="i.get('category')">
          <mat-option *ngFor="let category of categories" [value]="category.id">
            {{category.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Name</mat-label>
        <input matInput type="text" [formControl]="i.get('name')">
      </mat-form-field>
      <number-input class="mr-5" [formControl]="i.get('rating')" [min]="i.get('min').value" [max]="i.get('max').value">
        Rating
      </number-input>
      <mat-form-field appearance="outline" floatLabel="always" class="f-1">
        <mat-label>Specializations</mat-label>
        <mat-chip-list #chipList aria-label="Fruit selection">
          <mat-chip class="specialization-chip"
            *ngFor="let specialization of getSpecializations(i.get('specializations'))"
            [disabled]="isSpecializationDisabled(i, specialization)"
            (removed)="onRemoveSpecialization(specialization, i.get('specializations'))">
            {{specialization}}
            <mat-icon matChipRemove *ngIf="true">cancel</mat-icon>
          </mat-chip>
          <input [disabled]="i.get('rating').value < 3"
            [matChipInputFor]="chipList"
            [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
            [matChipInputAddOnBlur]="true"
            (matChipInputTokenEnd)="onAddSpecialization($event, i.get('specializations'))">
        </mat-chip-list>
      </mat-form-field>
      <button mat-icon-button type="button" [disabled]="!isDeletable(i)" (click)="onRemoveKnowledgeClick(i.get('id').value)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
