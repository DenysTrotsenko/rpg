<h2 mat-dialog-title>Clone</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline">
    <mat-label>New Name</mat-label>
    <input matInput [formControl]="control">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions class="actions">
  <button mat-stroked-button color="primary" class="mr-5" [mat-dialog-close]="false">
    Cancel
  </button>
  <button mat-flat-button color="primary" class="ml-5" [disabled]="!control.valid" [mat-dialog-close]="control.value">
    Clone
  </button>
</mat-dialog-actions>
