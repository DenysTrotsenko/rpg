<mat-toolbar class="toolbar-main">
  <h1>Character View</h1>
  <span class="f-1"></span>
  <button mat-icon-button (click)="view$.next('concise')" matTooltip="Concise View">
    <mat-icon>unfold_less</mat-icon>
  </button>
  <button mat-icon-button (click)="view$.next('full')" matTooltip="Full View">
    <mat-icon>unfold_more</mat-icon>
  </button>
</mat-toolbar>
<s5e-view-general [character]="character$ | async" [view]="view$ | async"></s5e-view-general>
<s5e-view-qualities [character]="character$ | async" [view]="view$ | async"></s5e-view-qualities>
<s5e-view-attributes [character]="character$ | async" [view]="view$ | async"></s5e-view-attributes>
<s5e-view-skills [character]="character$ | async" [view]="view$ | async"></s5e-view-skills>
<s5e-view-spells [character]="character$ | async" [view]="view$ | async"></s5e-view-spells>
<s5e-view-complex-forms [character]="character$ | async" [view]="view$ | async"></s5e-view-complex-forms>
