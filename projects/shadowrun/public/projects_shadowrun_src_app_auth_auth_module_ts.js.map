<form [formGroup]="form" (ngSubmit)="onSignIn(form.value)">
  <mat-card>
    <mat-card-header class="d-f ai-c jc-sb">
      <mat-card-title class="m-0">
        <h2 class="m-0">Sign In</h2>
      </mat-card-title>
      <button mat-button type="button" routerLink="/auth/sign-up">Go to Sign Up</button>
    </mat-card-header>

    <div class="progress-container">
      <mat-progress-bar *ngIf="progress$| async" mode="indeterminate"></mat-progress-bar>
    </div>

    <mat-card-content class="d-f fd-c ai-c">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" required formControlName="email">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="form.controls['email'].hasError('required')">Email is required.</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" hintLabel="Min 8 characters">
        <mat-label>Password</mat-label>
        <input matInput #pass type="password" required formControlName="password">
        <mat-icon matSuffix>visibility_off</mat-icon>
        <mat-hint align="end">{{ (8 - pass.value?.length || 0) > 0 ? (8 - pass.value?.length || 0) : '&#10004;' }}</mat-hint>
        <mat-error *ngIf="form.controls['password'].hasError('required')">Password is required.</mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions class="d-f fd-r jc-fe">
      <button mat-raised-button color="primary" type="submit" class="m-l-10" [disabled]="!form.valid">Continue</button>
    </mat-card-actions>
  </mat-card>
</form>
