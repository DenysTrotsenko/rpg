<form [formGroup]="form" (ngSubmit)="onSubmit(form.value)">
  <mat-card class="mb-15">
    <mat-card-header>
      <mat-card-title>Personal</mat-card-title>
    </mat-card-header>
    <mat-card-content class="d-f fd-r">
      <div class="d-f fd-c">
        <portrait-select formControlName="portrait" class="mr-15"></portrait-select>
      </div>
      <div class="d-f fd-c">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Metatype</mat-label>
          <mat-select formControlName="metatype">
            <mat-option *ngFor="let i of data.metatypes" [value]="i.id">
              {{i.name}} ({{i.cost}})
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Awakening</mat-label>
          <mat-select formControlName="awakening">
            <mat-option *ngFor="let i of data.awakenings" [value]="i.id">
              {{i.name}} ({{i.cost}})
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>

  <s5e-create-pc-qualities formControlName="qualities"
    [awakening]="form.get('awakening').value"
    [metatype]="form.get('metatype').value">
  </s5e-create-pc-qualities>

  <s5e-create-pc-attributes formControlName="attributes"
    [awakening]="form.get('awakening').value"
    [metatype]="form.get('metatype').value"
    [qualities]="form.get('qualities').value">
  </s5e-create-pc-attributes>

  <s5e-create-pc-skills formControlName="skills"
    [awakening]="form.get('awakening').value"
    [metatype]="form.get('metatype').value">
  </s5e-create-pc-skills>

  <s5e-create-pc-knowledge formControlName="knowledge"></s5e-create-pc-knowledge>

  <s5e-create-pc-contacts formControlName="contacts"></s5e-create-pc-contacts>

  <s5e-create-pc-spells formControlName="spells"></s5e-create-pc-spells>

  <s5e-create-pc-adept-powers formControlName="adept_powers"></s5e-create-pc-adept-powers>

  <s5e-create-pc-complex-forms formControlName="complex_forms"></s5e-create-pc-complex-forms>


  <mat-card class="mb-15">
<!--    <mat-card-content></mat-card-content>-->
    <mat-card-actions>
      <button type="reset" mat-button class="mr-15">Reset</button>
      <button type="submit" mat-flat-button color="primary">Save</button>
    </mat-card-actions>
  </mat-card>
</form>
