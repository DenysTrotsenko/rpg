<mat-card class="mb-15">
  <mat-card-header class="ai-fs">
    <mat-card-title>Contacts</mat-card-title>
    <button mat-button type="button" (click)="onAddContactClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let i of form.controls;" class="d-f ai-b fw-nw">
      <number-input class="mr-5" [min]="i.get('minC').value" max="6" [formControl]="i.get('connection')">
        Connection
      </number-input>
      <number-input class="mr-5" [min]="i.get('minL').value" max="6" [formControl]="i.get('loyalty')">
        Loyalty
      </number-input>
      <mat-form-field appearance="outline" floatLabel="always" class="mr-5">
        <mat-label>Name</mat-label>
        <input matInput type="text" [formControl]="i.get('name')">
      </mat-form-field>
      <mat-form-field appearance="outline" floatLabel="always">
        <mat-label>Details</mat-label>
        <input matInput type="text" [formControl]="i.get('details')">
      </mat-form-field>
      <span class="f-1"></span>
      <button mat-icon-button type="button" [disabled]="!isDeletable(i)" (click)="onRemoveContactClick(i.get('id').value)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
