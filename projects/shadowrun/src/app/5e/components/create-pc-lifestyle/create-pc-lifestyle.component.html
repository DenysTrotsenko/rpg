<mat-card class="mb-15">
  <mat-card-header class="ai-b">
    <mat-card-title>Lifestyles</mat-card-title>
    <button mat-button type="button" (click)="onAddClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let group of form.controls;" class="d-f ai-b fw-nw">
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Lifestyle</mat-label>
        <mat-select [formControl]="getFormControl(group, 'id')">
          <mat-option *ngFor="let i of LIFESTYLES" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Options</mat-label>
        <mat-select multiple [formControl]="getFormControl(group, 'options')">
          <mat-option *ngFor="let i of LIFESTYLE_OPTIONS" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" floatLabel="always" class="mr-5 f-1">
        <mat-label>Details</mat-label>
        <input matInput type="text" [formControl]="getFormControl(group, 'details')">
      </mat-form-field>
      <number-input [formControl]="getFormControl(group, 'term')" [min]="1" [max]="100">
        Term (Months)
      </number-input>
      <button mat-icon-button type="button" [disabled]="!isDeletable(group)" (click)="onRemoveClick(group.get('id').value)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
