<mat-card class="mb-15">
  <mat-card-header class="ai-b">
    <mat-card-title>Augmentations</mat-card-title>
    <button mat-button type="button" [disabled]="isAddDisabled(form.value)" (click)="onAddClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let group of form.controls; index as i;" class="d-f ai-b fw-nw">
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Complex Form</mat-label>
        <mat-select [formControl]="group.get('id')">
          <mat-option *ngFor="let i of items" [value]="i.id" [disabled]="isOptionDisabled(i.id)">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <span class="f-1"></span>
      <button mat-icon-button type="button" (click)="onRemoveClick(i)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
