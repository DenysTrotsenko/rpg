<mat-card class="mb-15">
  <mat-card-header class="ai-b">
    <mat-card-title>Gear</mat-card-title>
    <button mat-button type="button" (click)="onAddClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let group of form.controls; index as i;" class="d-f ai-b fw-nw">
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Type</mat-label>
        <mat-select [formControl]="group.get('type')">
          <mat-option *ngFor="let i of types" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Gear</mat-label>
        <mat-select [formControl]="group.get('id')">
          <mat-option *ngFor="let item of getItemsByType(group.get('type').value)" [value]="item.id">
            {{item.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <span class="f-1"></span>
      <number-input [formControl]="group.get('quantity')" [min]="1" [max]="9999"></number-input>
      <button mat-icon-button type="button" (click)="onRemoveClick(group.get('id').value)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
