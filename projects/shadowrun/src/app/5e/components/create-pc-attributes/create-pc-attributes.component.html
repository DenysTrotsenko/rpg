<mat-card class="mb-15">
  <mat-card-header>
    <mat-card-title>Attributes</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let i of form.controls;" class="d-f ai-b">
      <mat-form-field appearance="outline">
        <mat-label>{{ data.attributes | find: 'id' : i.get('id').value | map: 'name' }}</mat-label>
        <input matInput type="number"
               [formControl]="i.get('rating')"
               [min]="i.get('min').value"
               [max]="i.get('max').value">
      </mat-form-field>
    </div>
  </mat-card-content>
</mat-card>
