<mat-card class="mb-15">
  <mat-card-header class="ai-b">
    <mat-card-title>Submersion</mat-card-title>
    <button mat-button type="button" (click)="onAddClick()">
      <mat-icon>add</mat-icon> Add
    </button>
  </mat-card-header>
  <mat-card-content>
    <div *ngFor="let group of form.controls;" class="d-f ai-b fw-nw">
      <mat-form-field appearance="outline" class="mr-5">
        <mat-label>Echo</mat-label>
        <mat-select [formControl]="group.get('id')">
          <mat-option *ngFor="let i of echoes$ | async" [value]="i.id" [disabled]="isOptionDisabled(i.id)">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <ng-container *ngIf="echoes$ | async | find: 'id' : group.get('id').value as echo;">
        <number-input class="mr-5" [formControl]="group.get('rating')" [min]="group.get('min').value" [max]="group.get('max').value">
          Rating
        </number-input>
        <mat-form-field *ngIf="!!echo.specialty && !echo.formulas?.SPECIALTIES" appearance="outline" floatLabel="always">
          <mat-label>Specialty</mat-label>
          <input matInput type="text" [formControl]="group.get('specialty')">
        </mat-form-field>
        <mat-form-field *ngIf="!!echo.specialty && !!echo.formulas?.SPECIALTIES" appearance="outline" class="mr-5">
          <mat-label>Specialty</mat-label>
          <mat-select [formControl]="group.get('specialty')">
            <mat-option *ngFor="let s of echo.formulas?.SPECIALTIES(group.value);" [value]="s.id">{{s.name}}</mat-option>
          </mat-select>
        </mat-form-field>
      </ng-container>
      <span class="f-1"></span>
      <button mat-icon-button type="button" [disabled]="!isDeletable(group)" (click)="onRemoveClick(group.get('id').value)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
