<mat-sidenav-container>
  <mat-sidenav mode="side" opened>
    <mat-nav-list dense>
      <a *ngFor="let i of options;" mat-list-item [routerLink]="i.link" routerLinkActive="active">
        <span>{{i.label}}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="bs-bb p-10">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
