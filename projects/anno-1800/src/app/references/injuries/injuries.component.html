<mat-accordion>
  <mat-expansion-panel *ngFor="let i of injuries;" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title class="ff-g">{{i.name}} ({{(i.type | getById: TYPES.INJURY_TYPES)?.name}})</mat-panel-title>
    </mat-expansion-panel-header>
    <div>
      <p matLine>{{i.labels.effect}}</p>
    </div>
  </mat-expansion-panel>
</mat-accordion>
