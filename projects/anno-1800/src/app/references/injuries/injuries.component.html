<mat-sidenav-container>
  <mat-sidenav mode="side" opened position="end">
    <form [formGroup]="filters" class="d-f fd-c p-5">
      <span class="mb-10">
        <button mat-icon-button type="button" (click)="onRandomClick(moderateId)" matTooltip="Random Moderate Injury">
          <mat-icon matBadge="M" matBadgeDisabled="true">casino</mat-icon>
        </button>
        <button mat-icon-button type="button" (click)="onRandomClick(seriousId)" matTooltip="Random Serious Injury">
          <mat-icon matBadge="S" matBadgeDisabled="true">casino</mat-icon>
        </button>
        <button mat-icon-button type="button" (click)="onRandomClick(grievousId)" matTooltip="Random Grievous Injury">
          <mat-icon matBadge="G" matBadgeDisabled="true">casino</mat-icon>
        </button>
      </span>
      <mat-form-field appearance="outline" class="f-1">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
          <mat-option [value]="DEFAULT_VALUE">
            All
          </mat-option>
          <mat-option *ngFor="let i of types; trackBy: trackById;" [value]="i.id">
            {{i.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let i of injuries$ | async; trackBy: trackById;" hideToggle>
        <mat-expansion-panel-header>
          <mat-panel-title class="ff-g">{{i.name}} ({{(i.type | getById: TYPES.INJURY_TYPES)?.name}})</mat-panel-title>
        </mat-expansion-panel-header>
        <div>
          <p matLine>{{i.labels.effect}}</p>
        </div>
      </mat-expansion-panel>
      <mat-expansion-panel *ngFor="let i of permanentInjuries$ | async; trackBy: trackById;" hideToggle>
        <mat-expansion-panel-header>
          <mat-panel-title class="ff-g">{{i.name}} ({{(permanentId | getById: TYPES.INJURY_TYPES)?.name}})</mat-panel-title>
        </mat-expansion-panel-header>
        <div>
          <p matLine class="c-gray"><i>{{i.labels.description}}</i></p>
          <p matLine>{{i.labels.effect}}</p>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-sidenav-content>
</mat-sidenav-container>
