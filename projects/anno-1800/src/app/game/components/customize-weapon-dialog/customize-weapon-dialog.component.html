<h1 mat-dialog-title>Add Weapon</h1>
<div mat-dialog-content>
  <form [formGroup]="form" class="d-f fd-c cg-5">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Weapon</mat-label>
      <mat-select formControlName="id">
        <mat-option *ngFor="let i of weapons;" [value]="i.id">
          {{i.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Custom Qualities</mat-label>
      <mat-select multiple formControlName="custom">
        <mat-option *ngFor="let i of qualities$ | async;" [value]="i.id">
          {{i.name}}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-button [mat-dialog-close]="form.value" cdkFocusInitial>Add</button>
</div>
