<mat-accordion>
  <mat-expansion-panel *ngFor="let i of talents$ | async; trackBy: trackById;" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title class="ff-g">{{i.name}}</mat-panel-title>
    </mat-expansion-panel-header>
    <div>
      <p *ngIf="i.labels?.requirements" matLine><b>Requirements:</b> {{i.labels.requirements}}</p>
      <p matLine><i>{{i.labels?.description}}</i></p>
    </div>
  </mat-expansion-panel>
</mat-accordion>
